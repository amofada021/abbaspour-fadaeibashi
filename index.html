<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    سامانه هنرستان شهید عباس پور
  </title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <h1>
      ورود یا ثبت نام دانش آموزان
      هنرستان شهید عباس پور
    </h1>

    <input
      type="text"
      id="fullname"
      placeholder="نام و نام خانوادگی"
    >

    <input
      type="email"
      id="email"
      placeholder="ایمیل"
    >

    <input
      type="text"
      id="phone"
      placeholder="شماره تلفن"
    >

    <input
      type="password"
      id="password"
      placeholder="رمز عبور"
    >

    <button onclick="register()">
      ثبت نام
    </button>

    <button onclick="login()">
      ورود
    </button>

    <div id="message"></div>

  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
